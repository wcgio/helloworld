name: Build x86-64 (No xray-plugin)

on:
  workflow_dispatch:  # 手动触发

jobs:
  build:
    name: Build x86_64
    runs-on: ubuntu-latest

    steps:
      - name: Free Disk Space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build
        uses: immortalwrt/gh-action-sdk@v7
        env:
          ARCH: x86_64
          FEEDNAME: packages_ci
          V: s
          target: x86-64
          packages: luci-app-ssr-plus
          # 排除 xray-plugin（有兼容性问题）
          IGNORE_ERRORS: xray-plugin
          branch: openwrt-22.03

      - name: Move created packages to project dir
        run: cp bin/packages/x86_64/packages_ci/*.ipk . || true

      - name: List built packages
        run: |
          echo "编译完成的包："
          ls -lh *.ipk || echo "未找到 .ipk 文件"

      - name: Upload packages
        uses: actions/upload-artifact@v4
        with:
          name: x86-64-packages
          path: |
            *.ipk

      - name: Upload logs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: x86-64-logs
          path: logs/
